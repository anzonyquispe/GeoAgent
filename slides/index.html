```python
from shapely.geometry import Point, LineString, Polygon
import geopandas as gpd

pt = Point(-77.04, -12.05)                 # Lima, Peru
ln = LineString([(0,0), (1,1), (2,0)])
pg = Polygon([(0,0), (3,0), (3,2), (0,2)])

# A GeoDataFrame = table with a geometry column
gdf = gpd.GeoDataFrame({"name": ["Lima"]}, geometry=[pt], crs="EPSG:4326")
```

<div class="insight">Each feature is a <strong>row</strong> in a GeoDataFrame — geometry + any number of attribute columns (name, population, area …)</div>

## Shapefiles &amp; GeoDataFrames

<div class="cols" style="margin-top:0.4em;">
  <div class="col">
    <p style="font-weight:600;font-size:0.72em;color:#0f172a;margin:0 0 0.3em;">A Shapefile is actually 4+ files:</p>
    <div class="card cgray" style="font-size:0.65em;line-height:2;">
      <code>.shp</code> — geometry coordinates<br>
      <code>.dbf</code> — attribute table (columns)<br>
      <code>.shx</code> — spatial index<br>
      <code>.prj</code> — CRS / projection info
    </div>
    <p style="font-weight:600;font-size:0.65em;color:#64748b;margin:0.6em 0 0.2em;">Modern alternatives (prefer these):</p>
    <div style="font-size:0.62em;line-height:1.9;">
      <code>.gpkg</code> &nbsp;GeoPackage — single file ✅<br>
      <code>.geojson</code> — text, web-friendly<br>
      <code>.parquet</code> — fastest for large data
    </div>
  </div>
  <div class="col">

```python
import geopandas as gpd

# Same API for every format
gdf = gpd.read_file("countries.shp")
gdf = gpd.read_file("countries.gpkg")
gdf = gpd.read_file("countries.geojson")

print(gdf.crs)       # always check!
print(gdf.shape)     # rows × columns
gdf.head()           # first 5 rows

# Write out
gdf.to_file("out.gpkg", driver="GPKG")
```

<div class="warn">Always verify <code>gdf.crs</code> right after loading — a missing CRS means wrong distances and broken overlays.</div>
  </div>
</div>

<div class="badge b1">Part 1 · Data Types</div>

## CRS — Don't Skip This

<p style="font-size:0.74em;">A CRS tells software <strong>how to interpret coordinates</strong>. Get it wrong → wrong distances, broken overlays.</p>

| Family | Units | Example | Use for |
|---|---|---|---|
| **Geographic** | degrees | `EPSG:4326` (WGS84) | Data storage, web APIs |
| **Projected** | meters | `EPSG:32718` (UTM 18S) | Distance, area, buffers |

```python
gdf.crs                              # check current CRS
gdf_m = gdf.to_crs("EPSG:32718")    # reproject to meters (Peru)

# ❌ WRONG — degrees, not meaningful
gdf.geometry.distance(other)

# ✅ RIGHT — reproject first
gdf_m.geometry.distance(other_m)    # result in meters
gdf_m.geometry.area                 # result in m²
```

<div class="insight">
  Three rules: &nbsp;① every layer must have a CRS &nbsp;② distance/area needs a projected CRS &nbsp;③ all layers in an analysis must share the same CRS
</div>

```python
# Reproject to meters first (always!)
fires_m = fires.to_crs("EPSG:32718")   # UTM 18S, meters

# 10 km buffer around each fire point
fires_m["buf_10km"] = fires_m.geometry.buffer(10_000)

# Plot the buffers, then the points on top
ax = fires_m.set_geometry("buf_10km").plot(
        alpha=0.2, edgecolor="orange", color="orange")
fires_m.plot(ax=ax, color="red", markersize=2)
```

<div class="warn">Buffer distance is in <strong>CRS units</strong>. In EPSG:4326 (degrees) it is meaningless — always reproject to a metric CRS first.</div>
  </div>
</div>

<!-- SLIDE 10 · KEY INSIGHT TABLE -->

<div class="badge b1">Part 1 · Data Types</div>

## Vector vs Raster — The Key Insight

| | Vector | Raster / NC |
|---|---|---|
| **Structure** | Exact coordinates per feature | Regular grid of equal-size cells |
| **Best for** | Discrete objects: cities, roads, parcels | Continuous phenomena: temperature, elevation, rain |
| **File size scales with** | Number of features (rows) | Grid dimensions (fixed cost per resolution) |
| **Example** | 10 countries = 10 rows | Global 1 km grid = 180 × 360 cells, always |
| **File formats** | .shp, .gpkg, .geojson, .parquet | .tif (GeoTIFF), .nc (NetCDF), .h5 (HDF5) |
| **Python library** | geopandas, shapely | rasterio, rioxarray, xarray |

<div class="insight" style="margin-top:0.5em;">
  <strong>Raster is efficient for dense, continuous coverage.</strong> A 1° global temperature grid has only 180 × 360 = 64,800 cells — regardless of how many "features" exist. Storing the same data as vector polygons would cost orders of magnitude more. (ArcGIS, 2024)
</div>

import geopandas as gpd
from shapely.geometry import box

sa = gpd.read_file("south_america.gpkg")
equator = gpd.GeoDataFrame(
    geometry=[box(-180, -5, 180, 5)],
    crs="EPSG:4326"
)

# Area in BOTH layers
tropical = gpd.overlay(sa, equator,
                       how="intersection")
tropical.plot(color="orange")

# SA minus the equator band
rest = gpd.overlay(sa, equator,
                   how="difference")

        "GDP":     "mean"

parts = continents.explode(index_parts=False)

```python
import geopandas as gpd
import pandas as pd
from rasterstats import zonal_stats

zones = gpd.read_file("districts.gpkg")

stats = zonal_stats(
    zones,
    "elevation.tif",
    stats=["mean", "min", "max", "sum", "count"]
)

# Attach results back to GeoDataFrame
zones = zones.join(pd.DataFrame(stats))
zones[["name", "mean", "max"]]

# Now make a choropleth of mean elevation
zones.plot(column="mean", cmap="terrain",
           legend=True)

      <p>Turn a polygon layer into a raster where each cell = 1 (inside) or 0 (outside). Used to mask/clip rasters by region.</p>

    <div class="card cgreen" style="margin-bottom:0.45em;">
      <h3>Vectorize — raster classes → polygons</h3>
      <p>Turn connected regions of the same pixel value into polygons. Used with land cover or classification outputs.</p>
    </div>

```python
from rasterio import features
from rasterio.transform import from_bounds

# Rasterize: polygons → grid
mask = features.rasterize(
    [(geom, 1) for geom in gdf.geometry],
    out_shape=(height, width),
    transform=transform,
    fill=0, dtype="uint8"
)

# Vectorize: grid → polygons
shapes = list(features.shapes(mask, transform=transform))
polys = gpd.GeoDataFrame(
    geometry=[shapely.geometry.shape(g) for g,_ in shapes],
    crs="EPSG:4326"
)
```
